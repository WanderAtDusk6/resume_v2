<!doctype html>
<html lang="en">

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>

      /* Custom Scrollbar */
      ::-webkit-scrollbar {
        width: 6px;
        height: 6px;
      }
      ::-webkit-scrollbar-track {
        background: transparent;
      }
      ::-webkit-scrollbar-thumb {
        background: #cbd5e1;
        border-radius: 3px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: #94a3b8;
      }

      .animate-in {
        animation: fadeIn 0.2s ease-out;
      }
      @keyframes fadeIn {
        from {
          opacity: 0;
          transform: translateY(5px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      /* Utility for outline indentation lines */
      .tree-line {
        border-left: 1px solid #e2e8f0;
      }
    </style>

          "react/": "https://esm.sh/react@^19.2.3/",
          "react": "https://esm.sh/react@^19.2.3",
          "lucide-react": "https://esm.sh/lucide-react@^0.562.0"
        }
      }

    <link rel="stylesheet" href="/index.css" />
  </head>
  <body
    class="bg-slate-100 font-sans text-slate-800 h-screen flex flex-col overflow-hidden"
  >
    <!-- Compatibility: Hidden Root for legacy React mounters -->
    <div id="root" style="display: none"></div>

    <!-- Header -->
    <header
      class="bg-white border-b border-slate-200 px-4 py-3 md:px-6 flex flex-wrap md:flex-nowrap items-center gap-3 shadow-sm z-10 shrink-0"
    >
      <div class="p-2 bg-indigo-600 rounded-lg text-white shrink-0">
        <i data-lucide="layout" width="20" height="20"></i>
      </div>
      <div class="flex-1 min-w-[200px]">
        <h1
          class="font-bold text-lg md:text-xl text-slate-800 tracking-tight truncate"
        >
          Communication Assistant
        </h1>
        <p class="text-[10px] md:text-xs text-slate-500 truncate">
          讲述者助手 v3.1 (PUA to gemini3, nonsense series ©tsubasa_studio)
        </p>
      </div>
      <div class="flex items-center gap-2 ml-auto mt-2 md:mt-0">
        <input type="file" id="fileInput" class="hidden" accept=".json" />
        <button
          onclick="Handlers.triggerImport()"
          class="flex items-center gap-1.5 px-3 py-1.5 text-xs md:text-sm font-medium text-slate-600 hover:text-indigo-600 hover:bg-indigo-50 rounded-lg transition-colors border border-transparent hover:border-indigo-100"
        >
          <i data-lucide="upload" width="16" height="16"></i>
          <span class="hidden sm:inline">导入</span>
        </button>
        <button
          onclick="Handlers.exportData()"
          class="flex items-center gap-1.5 px-3 py-1.5 text-xs md:text-sm font-medium text-slate-600 hover:text-indigo-600 hover:bg-indigo-50 rounded-lg transition-colors border border-transparent hover:border-indigo-100"
        >
          <i data-lucide="download" width="16" height="16"></i>
          <span class="hidden sm:inline">导出</span>
        </button>
      </div>
    </header>

    <!-- Main Layout -->

    >
      <!-- Strategy Column (Left Desktop / Bottom Mobile) -->
      <aside
        class="order-3 md:order-1 col-span-12 md:col-span-3 flex flex-col h-[500px] md:h-full overflow-hidden bg-white rounded-xl border border-slate-200 shadow-sm"
      >
        <div
          class="px-4 py-3 border-b border-slate-100 flex items-center gap-2 bg-sky-50 text-sky-700"
        >
          <i data-lucide="compass" width="16" height="16"></i>
          <h3 class="font-bold text-sm uppercase tracking-wide opacity-90">
            回答策略库 (Strategy)
          </h3>
        </div>
        <div class="flex flex-col h-full overflow-hidden">
          <div
            id="strategy-list"
            class="flex-1 overflow-y-auto p-3 space-y-2"
          ></div>
          <!-- Methodology Panel -->
          <div
            id="methodology-panel"
            class="h-64 md:h-80 border-t border-sky-100 bg-white p-3 flex flex-col transition-opacity duration-200"
          >
            <!-- Content injected via JS -->
          </div>
        </div>
      </aside>

      <!-- Context Stream (Center Desktop / Top Mobile) -->
      <section
        class="order-1 md:order-2 col-span-12 md:col-span-6 flex flex-col gap-4 h-[650px] md:h-full overflow-hidden"
      >
        <!-- Outline -->
        <div
          class="flex-1 bg-white rounded-xl shadow-sm border border-slate-200 flex flex-col overflow-hidden"
        >
          <div
            class="p-3 md:p-4 border-b border-slate-100 bg-slate-50/50 flex justify-between items-center"
          >
            <h2
              class="font-bold text-slate-700 uppercase tracking-wide text-sm"
            >
              正文大纲 (Context Stream)
            </h2>
          </div>
          <div
            class="flex-1 overflow-y-auto p-4 md:p-6 custom-scrollbar relative"
          >
            <!-- Legend -->
            <div
              class="flex flex-wrap items-center gap-x-4 gap-y-2 text-xs text-slate-500 mb-4 px-3 py-2 bg-slate-50 rounded border border-slate-100 select-none"
            >
              <span class="font-bold mr-1 text-slate-700">状态:</span>
              <span class="flex items-center gap-1"
                ><i data-lucide="circle" width="12" class="text-slate-300"></i>
                待述</span
              >
              <span class="flex items-center gap-1"
                ><i
                  data-lucide="play"
                  width="12"
                  class="text-blue-600 fill-blue-600"
                ></i>
                焦点</span
              >
              <span class="flex items-center gap-1"
                ><i data-lucide="target" width="12" class="text-amber-500"></i>
                对齐</span
              >
              <span class="flex items-center gap-1"
                ><i
                  data-lucide="check-circle-2"
                  width="12"
                  class="text-emerald-500"
                ></i>
                完成</span
              >
            </div>
            <div id="outline-tree" class="flex flex-col gap-1 pb-10"></div>
            <div
              class="mt-8 pt-8 border-t border-dashed border-slate-200 text-center text-slate-400 text-sm"
            >
              -- End of Outline --
            </div>
          </div>
        </div>
        <!-- Scratchpad -->
        <div
          class="flex-none bg-white rounded-xl shadow-sm border border-slate-200 flex flex-col overflow-hidden"
        >
          <div
            class="px-3 py-2 bg-slate-50 border-b border-slate-100 flex justify-between items-center"
          >
            <div
              class="flex items-center gap-2 text-slate-500 text-xs font-bold uppercase tracking-wider"
            >
              <i data-lucide="type" width="14"></i> 临时板书 (Scratchpad)
            </div>
            <button
              onclick="Handlers.extractScratchpad()"
              class="flex items-center gap-1 text-[10px] bg-indigo-50 hover:bg-indigo-100 text-indigo-600 px-2 py-1 rounded border border-indigo-100 transition-colors"
            >
              <i data-lucide="arrow-right-from-line" width="12"></i> 提取至记忆
            </button>
          </div>
          <textarea
            id="scratchpad-input"
            class="w-full h-24 p-3 text-sm text-slate-700 resize-none focus:outline-none bg-slate-50/30 font-mono"
            placeholder="在此输入临时解释、绘图或草稿... 选中文字可提取为关键词"
          ></textarea>
        </div>
      </section>

      <!-- Right Column (Right Desktop / Middle Mobile) -->
      <aside
        class="order-2 md:order-3 col-span-12 md:col-span-3 flex flex-col gap-4 h-[600px] md:h-full overflow-hidden"
      >
        <!-- Memo Board -->
        <div
          class="flex-1 min-h-0 bg-white rounded-xl shadow-sm border border-slate-200 flex flex-col overflow-hidden relative"
        >
          <div
            id="memo-header"
            class="p-4 border-b flex justify-between items-center bg-slate-50"
          >
            <!-- Injected via JS -->
          </div>
          <div
            id="memo-list"
            class="flex-1 overflow-y-auto p-4 space-y-3 relative"
          >
            <!-- Injected via JS -->
          </div>
          <!-- Compression Overlay (Hidden by default) -->

            id="compression-modal"
            class="hidden absolute inset-0 bg-white/95 backdrop-blur-sm z-20 flex-col justify-center items-center p-6 animate-in"
          >
            <div
              class="w-full max-w-sm bg-white p-6 rounded-xl shadow-2xl border border-indigo-100"
            >
              <h4 class="text-lg font-bold text-slate-800 mb-2">压缩归纳</h4>
              <p class="text-sm text-slate-500 mb-4">归纳选中的碎片信息：</p>
              <input
                id="compression-input"
                type="text"
                class="w-full p-3 border border-slate-300 rounded-lg mb-4 focus:ring-2 focus:ring-indigo-500 outline-none text-sm font-medium"
              />
              <div class="flex justify-end gap-2">
                <button
                  onclick="Handlers.cancelCompress()"
                  class="px-3 py-2 text-slate-500 hover:bg-slate-100 rounded-lg text-sm font-medium"
                >
                  取消
                </button>
                <button
                  onclick="Handlers.confirmCompress()"
                  class="px-4 py-2 bg-indigo-600 hover:bg-indigo-700 text-white rounded-lg text-sm font-bold shadow-md"
                >
                  确认
                </button>
              </div>
            </div>

        </div>

        <!-- Preferences -->

            class="px-4 py-3 border-b border-slate-100 flex items-center justify-between bg-amber-50 text-amber-700"

              <h3 class="font-bold text-sm uppercase tracking-wide opacity-90">

              </h3>
            </div>
            <span

            >
          </div>
          <div class="p-3">
            <div id="preference-list" class="flex flex-col gap-2"></div>
            <button
              onclick="Handlers.addPreferencePrompt()"
              class="mt-2 w-full flex items-center justify-center gap-1 p-2 rounded-lg border border-dashed border-slate-300 text-slate-400 text-xs hover:border-amber-300 hover:text-amber-600 transition-colors"
            >
              <i data-lucide="plus" width="14"></i> 添加新偏好
            </button>
          </div>
        </div>

        <div
          class="h-auto shrink-0 bg-white rounded-xl border border-slate-200 overflow-hidden flex flex-col shadow-sm"
        >
          <div
            class="px-4 py-3 border-b border-slate-100 flex items-center justify-between bg-emerald-50 text-emerald-700"
          >
            <div class="flex items-center gap-2">
              <i data-lucide="target" width="16"></i>
              <h3 class="font-bold text-sm uppercase tracking-wide opacity-90">
                理解对齐
              </h3>
            </div>
            <span
              class="text-[10px] bg-black/10 px-1.5 py-0.5 rounded text-current font-mono opacity-70"
              >[AI Backend]</span
            >
          </div>
          <div id="alignment-panel" class="p-3 text-center"></div>
        </div>
      </aside>
    </main>

    <!-- Context Menu (Absolute Position) -->
    <div
      id="context-menu"
      class="hidden fixed z-50 bg-white border border-slate-200 shadow-xl rounded-lg py-1 w-40 flex-col animate-in"
    >
      <div
        class="px-3 py-1 text-[10px] uppercase font-bold text-slate-400 tracking-wider"
      >
        Set Status
      </div>
      <button
        onclick="Handlers.setNodeStatus('pending')"
        class="text-left px-4 py-2 hover:bg-slate-50 text-slate-600 text-sm flex items-center gap-2"
      >
        <i data-lucide="circle" width="14"></i> 重置
      </button>
      <button
        onclick="Handlers.setNodeStatus('current')"
        class="text-left px-4 py-2 hover:bg-blue-50 text-blue-600 text-sm flex items-center gap-2"
      >
        <i data-lucide="play" width="14"></i> 焦点
      </button>
      <button
        onclick="Handlers.setNodeStatus('alignment')"
        class="text-left px-4 py-2 hover:bg-amber-50 text-amber-600 text-sm flex items-center gap-2"
      >
        <i data-lucide="target" width="14"></i> 对齐
      </button>
      <div class="h-px bg-slate-100 my-1"></div>
      <button
        onclick="Handlers.setNodeStatus('done')"
        class="text-left px-4 py-2 hover:bg-emerald-50 text-emerald-600 text-sm flex items-center gap-2"
      >
        <i data-lucide="check-circle-2" width="14"></i> 完成
      </button>
      <button
        onclick="Handlers.setNodeStatus('skipped')"
        class="text-left px-4 py-2 hover:bg-slate-50 text-slate-400 text-sm flex items-center gap-2"
      >
        <i data-lucide="ban" width="14"></i> 跳过
      </button>
    </div>

                example: [
                  "遇到利益冲突时...",
                  "发现同事违规行为如何处理...",
                  "如何平衡个人利益与公司利益...",
                ],
                methodology: [
                  "1. 锚定原则：明确自己的核心道德原则",
                  "2. 分析困境：识别伦理困境的核心冲突点",
                  "3. 权衡利弊：分析不同决策可能带来的影响",
                  "4. 明确立场：基于核心原则做出决策，最小化负面影响",
                ],
              },
            ],
          },
        ],
        preferences: [
          { id: "pref-1", label: "注重 性能体验", checked: true },
          { id: "pref-2", label: "关注 工程规范", checked: false },
          { id: "pref-3", label: "偏好 业务价值", checked: false },
        ],
      };

      /**
       * ==========================================
       * STATE STORE
       * ==========================================
       */
      const Store = {
        data: JSON.parse(JSON.stringify(INITIAL_DATA)),
        memoItems: [],
        ui: {
          expandedNodes: new Set(),
          openGroups: new Set(),
          selectedStrategyId: null,
          selectedMemoIds: new Set(),
          alignmentStatus: "check", // 'check', 'aligned', 'lost'
          contextMenu: { visible: false, x: 0, y: 0, nodeId: null },
          editingMemoId: null,
          editingPrefId: null,
        },

        init() {
          // Default expanded: level 0
          this.data.outline.forEach((node) =>
            this.ui.expandedNodes.add(node.id),
          );
          if (this.data.strategyGroups.length > 0)
            this.ui.openGroups.add(this.data.strategyGroups[0].id);
          this.renderAll();
        },

        // --- Actions ---
        updateOutlineStatus(id, newStatus) {
          const findAndUpdate = (nodes) => {
            for (let node of nodes) {
              if (node.id === id) {
                node.status = newStatus;
                return true;
              }
              if (node.children && findAndUpdate(node.children)) return true;
            }
            return false;
          };
          findAndUpdate(this.data.outline);
          // Auto expand/collapse logic
          if (newStatus === "current") this.ui.expandedNodes.add(id);
          if (newStatus === "done" || newStatus === "skipped")
            this.ui.expandedNodes.delete(id);

          Render.outline();
        },

        toggleNode(id) {
          if (this.ui.expandedNodes.has(id)) this.ui.expandedNodes.delete(id);
          else this.ui.expandedNodes.add(id);
          Render.outline();
        },

        toggleStrategyGroup(id) {
          if (this.ui.openGroups.has(id)) this.ui.openGroups.delete(id);
          else this.ui.openGroups.add(id);
          Render.strategy();
        },

        selectStrategyItem(id) {
          this.ui.selectedStrategyId = id;
          Render.strategy();
        },

        addMemo(label, sourceId = null) {
          if (
            sourceId &&
            this.memoItems.find((m) => m.sourceNodeId === sourceId)
          )
            return;
          this.memoItems.push({
            id: "memo-" + Date.now(),
            label: label,
            timestamp: Date.now(),
            sourceNodeId: sourceId,
          });
          Render.memo();
        },

        toggleMemoSelect(id) {
          if (this.ui.selectedMemoIds.has(id))
            this.ui.selectedMemoIds.delete(id);
          else this.ui.selectedMemoIds.add(id);
          Render.memo();
        },

        removeMemo(id) {
          this.memoItems = this.memoItems.filter((m) => m.id !== id);
          this.ui.selectedMemoIds.delete(id);
          Render.memo();
        },

        compressMemos(newLabel) {
          const ids = Array.from(this.ui.selectedMemoIds);
          this.memoItems = this.memoItems.filter((m) => !ids.includes(m.id));
          this.memoItems.push({
            id: "comp-" + Date.now(),
            label: newLabel,
            timestamp: Date.now(),
            isCompressed: true,
          });
          this.ui.selectedMemoIds.clear();
          Render.memo();
        },

        updateMemoLabel(id, label) {
          const item = this.memoItems.find((m) => m.id === id);
          if (item) item.label = label;
          this.ui.editingMemoId = null;
          Render.memo();
        },

        togglePref(id) {
          const p = this.data.preferences.find((p) => p.id === id);
          if (p) p.checked = !p.checked;
          Render.preferences();
        },

        addPref(label) {
          this.data.preferences.push({
            id: "pref-" + Date.now(),
            label,
            checked: true,
          });
          Render.preferences();
        },

        deletePref(id) {
          this.data.preferences = this.data.preferences.filter(
            (p) => p.id !== id,
          );
          Render.preferences();
        },

        editPref(id, label) {
          const p = this.data.preferences.find((p) => p.id === id);
          if (p) p.label = label;
          this.ui.editingPrefId = null;
          Render.preferences();
        },

        importData(json) {
          if (json.outline && json.strategyGroups) {
            this.data = json;
            this.memoItems = [];
            this.ui.selectedStrategyId = null;
            this.renderAll();
          }
        },

        renderAll() {
          Render.outline();
          Render.strategy();
          Render.memo();
          Render.preferences();
          Render.alignment();
        },
      };

      /**
       * ==========================================
       * RENDERERS (HTML String Generators)
       * ==========================================
       */
      const Render = {
        outline() {
          const container = document.getElementById("outline-tree");
          let html = "";

          const renderNode = (nodes, level) => {
            let markup = "";
            nodes.forEach((node) => {
              const isExpanded = Store.ui.expandedNodes.has(node.id);
              const hasChildren = node.children && node.children.length > 0;

              // Icons
              let statusIcon = "";
              let statusClass = "";
              let rowClass = "py-1 border-l-4 border-transparent";

              if (node.status === "current") {
                statusIcon = `<i data-lucide="play" class="w-5 h-5 text-blue-600 fill-blue-600 animate-pulse"></i>`;
                rowClass =
                  "bg-blue-50/60 -mx-2 px-2 py-2 rounded-lg border-l-4 border-blue-500 shadow-sm my-1";
                statusClass = "text-blue-800 font-bold";
              } else if (node.status === "done") {
                statusIcon = `<i data-lucide="check-circle-2" class="w-5 h-5 text-emerald-500"></i>`;
                statusClass =
                  "text-slate-400 line-through decoration-slate-300";
              } else if (node.status === "alignment") {
                statusIcon = `<i data-lucide="target" class="w-5 h-5 text-amber-500"></i>`;
                statusClass = "text-amber-700 font-bold";
              } else if (node.status === "skipped") {
                statusIcon = `<i data-lucide="ban" class="w-5 h-5 text-slate-300"></i>`;
                statusClass = "text-slate-300 decoration-slate-200";
              } else {
                statusIcon = `<i data-lucide="circle" class="w-5 h-5 text-slate-300 hover:text-slate-400"></i>`;
                statusClass = "text-slate-700";
              }

              markup += `
                        <div class="select-none transition-all duration-300 relative group/row ${rowClass}">
                            <div class="flex items-start cursor-pointer" onclick="Handlers.toggleNode('${node.id}')" oncontextmenu="Handlers.openContextMenu(event, '${node.id}')">
                                <button class="mr-1 mt-0.5 p-0.5 rounded hover:bg-slate-200 text-slate-400 ${!hasChildren ? "invisible" : ""}">
                                    ${isExpanded ? '<i data-lucide="chevron-down" width="16"></i>' : '<i data-lucide="chevron-right" width="16"></i>'}
                                </button>
                                <div class="flex-1">
                                    <div class="flex items-center gap-2">
                                        <button onclick="event.stopPropagation(); Handlers.cycleStatus('${node.id}', '${node.status}')" class="hover:scale-110 transition-transform">
                                            ${statusIcon}
                                        </button>
                                        <span onclick="event.stopPropagation(); Handlers.setNodeStatus('current', '${node.id}')" class="font-medium text-lg leading-tight transition-colors flex-1 ${statusClass}">
                                            ${node.label}
                                        </span>
                                        <button onclick="event.stopPropagation(); Handlers.addMemoFromOutline('${node.id}', '${node.label.replace(/'/g, "\\'")}')" class="opacity-0 group-hover/row:opacity-100 transition-opacity p-1 rounded hover:bg-indigo-100 text-indigo-400 hover:text-indigo-600 ${node.status === "current" ? "opacity-50" : ""}">
                                            <i data-lucide="layers" width="16"></i><span class="text-[10px] font-bold absolute -top-1 -right-1">+</span>
                                        </button>
                                    </div>
                                    ${
                                      node.description &&
                                      (node.status === "current" ||
                                        isExpanded) &&
                                      node.status !== "skipped"
                                        ? `
                                        <div class="mt-2 ml-7 p-3 rounded-md text-sm text-slate-600 border border-slate-200 shadow-sm flex items-start gap-2 ${node.status === "current" ? "bg-white ring-1 ring-blue-100" : "bg-slate-50"}">
                                            ${node.status === "alignment" ? '<i data-lucide="target" width="14" class="mt-0.5 text-amber-500 shrink-0"></i>' : '<i data-lucide="file-text" width="14" class="mt-0.5 opacity-50 shrink-0"></i>'}
                                            <p>${node.description}</p>
                                        </div>
                                    `
                                        : ""
                                    }
                                </div>
                            </div>
                            ${hasChildren && isExpanded ? `<div class="ml-4 pl-2 border-l border-slate-200 mt-1">${renderNode(node.children, level + 1)}</div>` : ""}
                        </div>
                    `;
            });
            return markup;
          };

          container.innerHTML = renderNode(Store.data.outline, 0);
          lucide.createIcons();
        },

        strategy() {
          const listContainer = document.getElementById("strategy-list");
          const detailContainer = document.getElementById("methodology-panel");

          // List
          let listHtml = "";
          Store.data.strategyGroups.forEach((group) => {
            const isOpen = Store.ui.openGroups.has(group.id);
            listHtml += `
                    <div class="border border-slate-200 rounded-lg overflow-hidden shrink-0">
                        <button onclick="Store.toggleStrategyGroup('${group.id}')" class="w-full flex items-center gap-2 p-2.5 bg-slate-50 hover:bg-slate-100 transition-colors text-left text-sm font-bold text-slate-700">
                            ${isOpen ? '<i data-lucide="folder-open" width="16" class="text-sky-500"></i>' : '<i data-lucide="folder" width="16" class="text-slate-400"></i>'}
                            <span class="flex-1">${group.title}</span>
                            <i data-lucide="chevron-right" width="14" class="transition-transform text-slate-400 ${isOpen ? "rotate-90" : ""}"></i>
                        </button>
                        ${
                          isOpen
                            ? `
                            <div class="bg-white p-1 space-y-1">
                                ${group.items
                                  .map(
                                    (item) => `
                                    <button onclick="Store.selectStrategyItem('${item.id}')" class="w-full text-left px-3 py-2 rounded text-xs transition-colors flex flex-col gap-0.5 ${Store.ui.selectedStrategyId === item.id ? "bg-sky-100 text-sky-800 font-medium" : "text-slate-600 hover:bg-slate-50"}">
                                        <div class="flex justify-between items-center w-full">
                                            <span>${item.title}</span>
                                            ${Store.ui.selectedStrategyId === item.id ? '<div class="w-1.5 h-1.5 rounded-full bg-sky-500"></div>' : ""}
                                        </div>
                                    </button>
                                `,
                                  )
                                  .join("")}
                            </div>
                        `
                            : ""
                        }
                    </div>
                `;
          });
          listContainer.innerHTML = listHtml;

          // Detail
          const activeItem = Store.data.strategyGroups
            .flatMap((g) => g.items)
            .find((i) => i.id === Store.ui.selectedStrategyId);
          if (activeItem) {
            detailContainer.innerHTML = `
                    <div class="flex items-center gap-1.5 mb-2 text-sky-700 font-bold text-xs uppercase tracking-wider shrink-0">
                        <i data-lucide="lightbulb" width="14"></i>
                        <span>回答方法论 (${activeItem.title})</span>
                    </div>
                    <div class="bg-sky-50/50 rounded-lg p-3 border border-sky-100 flex-1 overflow-y-auto custom-scrollbar">
                        <div class="text-xs text-slate-500 mb-3 italic">${activeItem.description}</div>
                        <ul class="space-y-2">
                            ${activeItem.methodology
                              .map(
                                (step) => `
                                <li class="text-xs text-slate-700 leading-snug flex items-start gap-2">
                                    <span class="w-1.5 h-1.5 mt-1.5 rounded-full bg-sky-400 shrink-0"></span>
                                    <span>${step}</span>
                                </li>
                            `,
                              )
                              .join("")}
                        </ul>
                    </div>
                `;
            detailContainer.classList.remove("opacity-50", "grayscale");
          } else {
            detailContainer.innerHTML = `
                     <div class="h-full flex flex-col items-center justify-center text-slate-400 text-xs text-center">
                         <i data-lucide="compass" width="24" class="mb-2 opacity-20"></i>
                         <p>请点击上方具体类型<br/>查看通用回答逻辑</p>
                     </div>
                `;
            detailContainer.classList.add("opacity-50", "grayscale");
          }

          lucide.createIcons();
        },

        memo() {
          const header = document.getElementById("memo-header");
          const list = document.getElementById("memo-list");
          const isOverloaded = Store.memoItems.length > 7;
          const selectedCount = Store.ui.selectedMemoIds.size;

          // Header
          header.className = `p-4 border-b flex justify-between items-center ${isOverloaded ? "bg-amber-50" : "bg-slate-50"}`;
          header.innerHTML = `
                <div class="flex items-center gap-2">
                    <i data-lucide="layers" width="20" class="${isOverloaded ? "text-amber-600" : "text-indigo-600"}"></i>
                    <div>
                        <div class="flex items-center gap-2">
                            <h3 class="font-bold text-slate-700">短期记忆</h3>
                            <span class="text-[10px] bg-black/10 px-1.5 py-0.5 rounded text-slate-500 font-mono opacity-70">[AI Backend]</span>
                        </div>
                        <span class="text-xs ${isOverloaded ? "text-amber-600 font-bold" : "text-slate-400"}">负荷: ${Store.memoItems.length} / 7±2 块</span>
                    </div>
                </div>
                ${
                  selectedCount > 1
                    ? `
                    <button onclick="Handlers.openCompressModal()" class="flex items-center gap-1.5 bg-indigo-600 hover:bg-indigo-700 text-white px-3 py-1.5 rounded-lg text-xs font-bold shadow-sm transition-all active:scale-95">
                        <i data-lucide="minimize-2" width="14"></i> <span>压缩 (${selectedCount})</span>
                    </button>
                `
                    : ""
                }
            `;

          // List
          if (Store.memoItems.length === 0) {
            list.innerHTML = `<div class="text-center text-slate-400 mt-10 italic text-sm">记忆区为空。<br/>在左侧激活大纲要点或从板书提取。</div>`;
          } else {
            list.innerHTML = Store.memoItems
              .map((item) => {
                const isSelected = Store.ui.selectedMemoIds.has(item.id);
                const isEditing = Store.ui.editingMemoId === item.id;
                return `
                        <div class="relative group flex items-center gap-3 p-3 rounded-lg border transition-all duration-200 ${isSelected ? "bg-indigo-50 border-indigo-300" : "bg-white border-slate-200 hover:border-indigo-200 hover:shadow-md"} ${item.isCompressed ? "border-l-4 border-l-purple-500" : ""}">
                            <button onclick="Store.toggleMemoSelect('${item.id}')" class="text-slate-400 hover:text-indigo-600 shrink-0">
                                ${isSelected ? '<i data-lucide="check-square" width="20" class="text-indigo-600"></i>' : '<i data-lucide="square" width="20"></i>'}
                            </button>
                            <div class="flex-1 min-w-0">
                                ${
                                  isEditing
                                    ? `
                                    <input value="${item.label}" onkeydown="if(event.key==='Enter') Handlers.saveMemoEdit(this.value)" onblur="Handlers.saveMemoEdit(this.value)" class="w-full px-1 py-0.5 border-b border-indigo-500 focus:outline-none bg-transparent font-medium" autoFocus>
                                `
                                    : `
                                    <span ondblclick="Handlers.startEditMemo('${item.id}')" class="block font-medium text-slate-700 truncate cursor-pointer select-none">${item.label}</span>
                                `
                                }
                                ${item.isCompressed ? '<span class="text-[10px] uppercase tracking-wider text-purple-500 font-bold">已压缩概念</span>' : ""}
                            </div>
                            <div class="flex items-center opacity-0 group-hover:opacity-100 transition-opacity gap-1 shrink-0 bg-white/80 rounded">
                                <button onclick="Handlers.startEditMemo('${item.id}')" class="p-1 hover:bg-slate-100 rounded text-slate-400 hover:text-indigo-500"><i data-lucide="edit-2" width="14"></i></button>
                                <button onclick="Store.removeMemo('${item.id}')" class="p-1 hover:bg-red-50 rounded text-slate-400 hover:text-red-500"><i data-lucide="x" width="14"></i></button>
                            </div>
                        </div>
                    `;
              })
              .join("");
            // Auto focus logic needs to be handled after insertion for input
            if (Store.ui.editingMemoId) {
              const input = list.querySelector("input");
              if (input) input.focus();
            }
          }
          lucide.createIcons();
        },

        preferences() {
          const list = document.getElementById("preference-list");
          list.innerHTML = Store.data.preferences
            .map((pref) => {
              const isEditing = Store.ui.editingPrefId === pref.id;
              return `
                    <div class="group flex items-center gap-2 p-2 rounded-lg border transition-all ${pref.checked ? "bg-amber-50 border-amber-300" : "bg-white border-slate-200 hover:bg-slate-50"}">
                        <div onclick="Store.togglePref('${pref.id}')" class="cursor-pointer text-slate-400 hover:text-amber-500">
                             ${pref.checked ? '<i data-lucide="check-square" width="18" class="text-amber-500"></i>' : '<i data-lucide="square" width="18"></i>'}
                        </div>
                         <div class="flex-1 min-w-0">
                            ${
                              isEditing
                                ? `
                                <input value="${pref.label}" onkeydown="if(event.key==='Enter') Handlers.savePrefEdit(this.value)" onblur="Handlers.savePrefEdit(this.value)" class="w-full text-sm p-1 border-b border-amber-500 outline-none bg-transparent">
                            `
                                : `
                                <span ondblclick="Handlers.startEditPref('${pref.id}')" class="block text-sm font-medium select-none truncate ${pref.checked ? "text-slate-800" : "text-slate-400"}">${pref.label}</span>
                            `
                            }
                        </div>
                        <div class="hidden group-hover:flex items-center gap-1">
                             <button onclick="Handlers.startEditPref('${pref.id}')" class="p-1 text-slate-300 hover:text-amber-600"><i data-lucide="edit-2" width="12"></i></button>
                             <button onclick="Store.deletePref('${pref.id}')" class="p-1 text-slate-300 hover:text-red-500"><i data-lucide="trash-2" width="12"></i></button>
                        </div>
                    </div>
                `;
            })
            .join("");
          if (Store.ui.editingPrefId) {
            const input = list.querySelector("input");
            if (input) input.focus();
          }
          lucide.createIcons();
        },

        alignment() {
          const container = document.getElementById("alignment-panel");
          const s = Store.ui.alignmentStatus;

          if (s === "check") {
            container.innerHTML = `
                    <p class="text-sm text-slate-600 mb-3">推进前请确认双方是否都理解</p>
                    <div class="flex flex-col gap-2">
                        <button onclick="Handlers.setAlignment('aligned')" class="w-full py-2 bg-emerald-600 hover:bg-emerald-700 text-white rounded-lg shadow-emerald-200 shadow-md font-bold transition-transform active:scale-95">确认对齐 (Aligned)</button>
                        <button onclick="Handlers.setAlignment('lost')" class="w-full py-2 bg-white border border-slate-200 text-slate-500 hover:bg-slate-50 rounded-lg text-sm">发现困惑 (Confused)</button>
                    </div>
                `;
          } else if (s === "aligned") {
            container.innerHTML = `
                     <div class="w-full p-4 bg-emerald-100 rounded-lg border border-emerald-200 animate-in">
                        <div class="text-emerald-700 font-bold mb-1">已对齐</div>
                        <div class="text-emerald-600 text-xs">可继续深入下个话题</div>
                        <button onclick="Handlers.setAlignment('check')" class="mt-3 text-xs underline text-emerald-800">重置状态</button>
                     </div>
                `;
          } else {
            container.innerHTML = `
                     <div class="w-full p-4 bg-rose-100 rounded-lg border border-rose-200 animate-in">
                        <div class="text-rose-700 font-bold mb-1">失联/疑惑</div>
                        <div class="text-rose-600 text-xs">减少细节，使用类比，提问互动</div>
                        <button onclick="Handlers.setAlignment('check')" class="mt-3 text-xs underline text-rose-800">重置状态</button>
                     </div>
                `;
          }
        },
      };

      /**
       * ==========================================
       * EVENT HANDLERS
       * ==========================================
       */
      const Handlers = {
        cycleStatus(id, currentStatus) {
          const cycle = {
            pending: "current",
            current: "done",
            done: "pending",
            alignment: "current",
            skipped: "current",
          };
          Store.updateOutlineStatus(id, cycle[currentStatus] || "pending");
        },

        setNodeStatus(status, id = null) {
          const targetId = id || Store.ui.contextMenu.nodeId;
          if (targetId) {
            Store.updateOutlineStatus(targetId, status);
            this.closeContextMenu();
          }
        },

        toggleNode(id) {
          Store.toggleNode(id);
        },

        openContextMenu(e, id) {
          e.preventDefault();
          const menu = document.getElementById("context-menu");
          Store.ui.contextMenu = {
            visible: true,
            x: e.clientX,
            y: e.clientY,
            nodeId: id,
          };
          menu.style.left = `${e.clientX}px`;
          menu.style.top = `${e.clientY}px`;
          menu.classList.remove("hidden");
          menu.classList.add("flex");
        },

        closeContextMenu() {
          const menu = document.getElementById("context-menu");
          menu.classList.add("hidden");
          menu.classList.remove("flex");
          Store.ui.contextMenu = { visible: false, nodeId: null };
        },

        addMemoFromOutline(id, label) {
          Store.addMemo(label, id);
        },

        extractScratchpad() {
          const textarea = document.getElementById("scratchpad-input");
          const text =
            textarea.value
              .substring(textarea.selectionStart, textarea.selectionEnd)
              .trim() ||
            (textarea.value.length < 50 ? textarea.value.trim() : "");

          if (text) {
            Store.addMemo(text);
            if (text === textarea.value.trim()) textarea.value = "";
          } else {
            alert("请选择要提取为关键词的文本段落");
          }
        },

        startEditMemo(id) {
          Store.ui.editingMemoId = id;
          Render.memo();
        },
        saveMemoEdit(val) {
          if (val.trim())
            Store.updateMemoLabel(Store.ui.editingMemoId, val.trim());
        },

        openCompressModal() {
          const modal = document.getElementById("compression-modal");
          const input = document.getElementById("compression-input");
          const selectedItems = Store.memoItems.filter((i) =>
            Store.ui.selectedMemoIds.has(i.id),
          );
          const labels = selectedItems.map((i) => i.label).join(", ");
          input.value = `[归纳] ${labels.substring(0, 15)}${labels.length > 15 ? "..." : ""}`;
          modal.classList.remove("hidden");
          modal.classList.add("flex");
          input.focus();
        },

        cancelCompress() {
          document.getElementById("compression-modal").classList.add("hidden");
          document.getElementById("compression-modal").classList.remove("flex");
        },

        confirmCompress() {
          const input = document.getElementById("compression-input");
          if (input.value.trim()) {
            Store.compressMemos(input.value.trim());
            this.cancelCompress();
          }
        },

        startEditPref(id) {
          Store.ui.editingPrefId = id;
          Render.preferences();
        },
        savePrefEdit(val) {
          if (val.trim()) Store.editPref(Store.ui.editingPrefId, val.trim());
        },

        addPreferencePrompt() {
          const val = prompt("输入新听众偏好:");
          if (val && val.trim()) Store.addPref(val.trim());
        },

        setAlignment(s) {
          Store.ui.alignmentStatus = s;
          Render.alignment();
        },

        // Data IO
        exportData() {
          const blob = new Blob([JSON.stringify(Store.data, null, 2)], {
            type: "application/json",
          });
          const url = URL.createObjectURL(blob);
          const a = document.createElement("a");
          a.href = url;
          a.download = `narrator-data-${new Date().toISOString().slice(0, 10)}.json`;
          a.click();
        },

        triggerImport() {
          document.getElementById("fileInput").click();
        },
      };

      // --- Global Init ---
      document.addEventListener("click", (e) => {
        if (Store.ui.contextMenu.visible && !e.target.closest("#context-menu"))
          Handlers.closeContextMenu();
      });

      document.getElementById("fileInput").addEventListener("change", (e) => {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = (ev) => {
          try {
            Store.importData(JSON.parse(ev.target.result));
          } catch (err) {
            alert("Invalid JSON");
          }
        };
        reader.readAsText(file);
        e.target.value = "";
      });

      // Start App
      Store.init();
    </script>
    <script type="module" src="/index.tsx"></script>
  </body>
</html>
